<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Beng - Thông Báo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-glass: rgba(17, 18, 20, 0.65); --bg-card: rgba(30, 31, 34, 0.8); --bg-dark: rgba(11, 11, 12, 0.9);
            --discord-blue: #5865F2; --discord-green: #23a55a; --text-main: #f2f3f5; --text-muted: #b5bac1; 
            --white: #ffffff; --neon-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); --border-glass: 1px solid rgba(255, 255, 255, 0.07);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(rgba(10, 10, 12, 0.45), rgba(10, 10, 12, 0.65)), url('./img/cs2background.webp') no-repeat center center fixed; background-size: cover; color: var(--text-main); overflow-x: hidden; padding-bottom: 80px; }
        .navbar { background: var(--bg-dark); backdrop-filter: blur(12px); display: flex; justify-content: space-between; align-items: center; padding: 0 5%; height: 70px; position: sticky; top: 0; z-index: 1000; border-bottom: var(--border-glass); box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        .logo { font-size: 24px; font-weight: 800; color: var(--white); display: flex; align-items: center; gap: 12px; }
        .nav-links { display: flex; list-style: none; gap: 8px; }
        .nav-btn { background: none; border: none; color: var(--text-muted); font-size: 15px; font-weight: 600; padding: 10px 18px; border-radius: 8px; text-decoration: none; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .nav-btn.active { color: var(--white); background-color: rgba(88, 101, 242, 0.2); border: 1px solid rgba(88, 101, 242, 0.4); }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .welcome-box { background: var(--bg-glass); backdrop-filter: blur(16px); border-radius: 16px; padding: 24px; margin-bottom: 25px; border: var(--border-glass); box-shadow: var(--neon-shadow); min-height: 200px; }
        .welcome-title { font-size: 14px; color: var(--discord-green); margin-bottom: 18px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; font-weight: 800; letter-spacing: 1.5px; }
        .welcome-list { display: flex; flex-direction: column; gap: 12px; }
        
        .welcome-card { 
            background-color: var(--bg-card); padding: 16px 20px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: space-between; 
            border: var(--border-glass); border-left: 5px solid var(--discord-green);
            margin-bottom: 10px;
        }
        .slide-down { animation: slideDown 0.5s ease forwards; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }

        .welcome-user { display: flex; align-items: center; gap: 15px; }
        .welcome-icon { font-size: 24px; color: var(--discord-blue); }
        .welcome-user div { color: var(--white); font-weight: 600; }
        .welcome-time { font-size: 13px; color: var(--text-muted); background: rgba(0, 0, 0, 0.2); padding: 4px 10px; border-radius: 20px; }
    </style>
</head>
<body>
    <nav class="navbar">
<div class="logo"><i class="fa-brands fa-discord"></i> Flash Beng</div>
        <ul class="nav-links">
            <li><a href="index.html" class="nav-btn"><i class="fa-solid fa-layer-group"></i> Trang Chủ</a></li>
            <li><a href="thanh-vien.html" class="nav-btn active"><i class="fa-solid fa-user-group"></i> Thành Viên</a></li>
            <li><a href="chi-tiet.html" class="nav-btn"><i class="fa-solid fa-compass"></i> Chi Tiết</a></li>
            <li><a href="thong-bao.html" class="nav-btn"><i class="fa-solid fa-bullhorn"></i> Thông Báo</a></li>
        </ul>
    </nav>
    <div class="container">
        <div class="welcome-box">
            <div class="welcome-title"><i class="fa-solid fa-bullhorn"></i> Bảng Tin Sự Kiện</div>
            
            <div class="welcome-list" id="announcementList">
                <div class="welcome-card slide-down">
                    <div class="welcome-user">
                        <i class="fa-solid fa-star welcome-icon"></i>
                        <div>Giải đấu CS2 mùa hè chính thức mở đăng ký!</div>
                    </div>
                    <div class="welcome-time">10/06/2026</div>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
