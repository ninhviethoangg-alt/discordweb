<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST COMMUNITY - Chi Tiết</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-glass: rgba(17, 18, 20, 0.65); 
            --bg-card: rgba(30, 31, 34, 0.8); 
            --bg-dark: rgba(11, 11, 12, 0.9);
            --discord-blue: #5865F2; 
            --text-main: #f2f3f5; 
            --text-muted: #b5bac1; 
            --white: #ffffff;
            --neon-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); 
            --border-glass: 1px solid rgba(255, 255, 255, 0.07);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(rgba(10, 10, 12, 0.45), rgba(10, 10, 12, 0.65)), url('./img/cs2background.webp') no-repeat center center fixed;
            background-size: cover; color: var(--text-main); overflow-x: hidden; padding-bottom: 80px;
        }
        .navbar {
            background: var(--bg-dark); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            display: flex; justify-content: space-between; align-items: center; padding: 0 5%; height: 70px;
            position: sticky; top: 0; z-index: 1000; border-bottom: var(--border-glass); box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        .logo { font-size: 24px; font-weight: 800; color: var(--white); display: flex; align-items: center; gap: 12px; }
        .logo i { color: var(--discord-blue); filter: drop-shadow(0 0 8px rgba(88, 101, 242, 0.6)); }
        .nav-links { display: flex; list-style: none; gap: 8px; }
        .nav-btn {
            background: none; border: none; color: var(--text-muted); font-size: 15px; font-weight: 600;
            padding: 10px 18px; border-radius: 8px; text-decoration: none; display: flex; align-items: center; gap: 8px; transition: all 0.2s;
        }
        .nav-btn:hover { color: var(--white); background-color: rgba(255, 255, 255, 0.06); }
        .nav-btn.active {
            color: var(--white); background-color: rgba(88, 101, 242, 0.2);
            border: 1px solid rgba(88, 101, 242, 0.4); box-shadow: 0 0 15px rgba(88, 101, 242, 0.2);
        }
        .container { max-width: 1000px; margin: 40px auto 0 auto; padding: 0 20px; width: 100%; display: block; }
        
        .content-box {
            background: var(--bg-glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            padding: 35px; border-radius: 16px; border: var(--border-glass); box-shadow: var(--neon-shadow);
            width: 100%; display: block;
        }
        .content-box h2 { color: var(--white); margin-bottom: 20px; font-size: 26px; font-weight: 800; display: flex; align-items: center; gap: 12px; width: 100%; }
        .content-box p { font-size: 16px; line-height: 1.7; opacity: 0.95; width: 100%; display: block; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><i class="fa-brands fa-discord"></i> GHOST COMMUNITY</div>
        <ul class="nav-links">
            <li><a href="index.html" class="nav-btn"><i class="fa-solid fa-layer-group"></i> Trang Chủ</a></li>
            <li><a href="thanh-vien.html" class="nav-btn"><i class="fa-solid fa-user-group"></i> Thành Viên</a></li>
            <li><a href="chi-tiet.html" class="nav-btn active"><i class="fa-solid fa-compass"></i> Chi Tiết</a></li>
            <li><a href="thong-bao.html" class="nav-btn"><i class="fa-solid fa-bullhorn"></i> Thông Báo</a></li>
        </ul>
    </nav>
    <div class="container">
        <div class="content-box">
            <h2><i class="fa-solid fa-circle-info" style="color: #f1c40f;"></i> Thông Tin Vận Hành</h2>
            <p>Cung cấp tài liệu hướng dẫn, sơ đồ phòng chat và các quy chuẩn ứng xử chung trong server. Hãy đảm bảo bạn luôn theo dõi các chỉ mục tại đây để giữ vững môi trường giao lưu lành mạnh.</p>
        </div>
    </div>
</body>
</html>
